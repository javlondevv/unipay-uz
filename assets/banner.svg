<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="UniPay UZ — Unified payments for Uzbekistan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b3e"/>
      <stop offset="0.55" stop-color="#15357a"/>
      <stop offset="1" stop-color="#0a8f6e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36d1a6"/>
      <stop offset="1" stop-color="#5ea0ff"/>
    </linearGradient>
    <style>
      .t  { font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="300" rx="24" fill="url(#bg)"/>

  <!-- card motif -->
  <g transform="translate(92 96)" opacity="0.96">
    <rect width="168" height="108" rx="16" fill="#ffffff" opacity="0.10"/>
    <rect width="168" height="108" rx="16" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <rect x="18" y="26" width="46" height="34" rx="6" fill="url(#accent)"/>
    <rect x="18" y="74" width="120" height="9" rx="4.5" fill="#ffffff" opacity="0.65"/>
    <rect x="18" y="88" width="78" height="9" rx="4.5" fill="#ffffff" opacity="0.4"/>
  </g>

  <text class="t" x="306" y="138" font-size="76" font-weight="800" fill="#ffffff">UniPay&#160;UZ</text>
  <text class="t" x="308" y="186" font-size="27" font-weight="500" fill="#cfe0ff">Unified payments for Uzbekistan</text>

  <!-- provider chips -->
  <g class="t" font-size="20" font-weight="600" fill="#ffffff">
    <g transform="translate(308 214)">
      <rect width="96"  height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="48" y="26" text-anchor="middle">Payme</text>
    </g>
    <g transform="translate(416 214)">
      <rect width="84"  height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="42" y="26" text-anchor="middle">Click</text>
    </g>
    <g transform="translate(512 214)">
      <rect width="92"  height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="46" y="26" text-anchor="middle">Uzum</text>
    </g>
    <g transform="translate(616 214)">
      <rect width="104" height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="52" y="26" text-anchor="middle">Paynet</text>
    </g>
    <g transform="translate(732 214)">
      <rect width="80"  height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="40" y="26" text-anchor="middle">Octo</text>
    </g>
  </g>

  <text class="t" x="1108" y="270" text-anchor="end" font-size="17" font-weight="600" fill="#8fb6ff" opacity="0.85">Django · FastAPI · Flask</text>
</svg>
