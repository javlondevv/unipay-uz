site_name: UniPay UZ
site_description: One unified Python API for Uzbekistan's payment gateways — Payme, Click, Uzum, Paynet & Octo.
site_url: https://javlondevv.github.io/unipay-uz/
repo_url: https://github.com/javlondevv/unipay-uz
repo_name: javlondevv/unipay-uz
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Gateways:
      - Overview: gateways/index.md
      - Payme: gateways/payme.md
      - Click: gateways/click.md
      - Uzum: gateways/uzum.md
      - Paynet: gateways/paynet.md
      - Octo: gateways/octo.md
  - Framework Integrations:
      - Django: integrations/django.md
      - FastAPI: integrations/fastapi.md
  - Exceptions: exceptions.md
  - Contributing: contributing.md
  - License: license.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/javlondevv
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/unipay-uz/
    - icon: fontawesome/brands/telegram
      link: https://t.me/DevFlowJavlon
